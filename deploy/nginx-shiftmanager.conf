# ShiftManager 用 Nginx 設定（このPCで練習する用・HTTPS対応）
#
# 役割:
#   80番   → 443番(HTTPS)へリダイレクト
#   443番  → /static/・/media/ を直接配信、それ以外は Gunicorn(127.0.0.1:8000) へ中継
#   TLS    → mkcert で発行したローカル証明書（deploy/certs/）
#
# 適用方法は deploy/README.md を参照。

# HTTP(80) は HTTPS(443) へ恒久リダイレクト
server {
    listen 80;
    server_name 192.168.10.8 localhost 127.0.0.1;
    return 301 https://$host$request_uri;
}

# HTTPS(443) 本体
server {
    listen 443 ssl;
    server_name 192.168.10.8 localhost 127.0.0.1;

    # mkcert で発行したローカル証明書（鍵はGit管理外）
    ssl_certificate     /home/nagin/ShiftManager/deploy/certs/lan-cert.pem;
    ssl_certificate_key /home/nagin/ShiftManager/deploy/certs/lan-key.pem;

    # アップロードPDFのサイズに合わせて余裕を持たせる（フォームは10MB制限）
    client_max_body_size 12m;

    # 静的ファイル（collectstatic の出力先を直接配信）
    location /static/ {
        alias /home/nagin/ShiftManager/staticfiles/;
        access_log off;
        expires 7d;
    }

    # アップロードされたメディア（確定シフトPDF など）
    location /media/ {
        alias /home/nagin/ShiftManager/media/;
    }

    # 動的リクエストは Gunicorn へ中継。X-Forwarded-Proto で「httpsで受けた」ことを伝える
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
