# ShiftManager 用 Nginx 設定（このPCで練習する用）
#
# 役割:
#   /static/ ・ /media/  → Nginx がファイルを直接配信
#   それ以外            → Gunicorn(127.0.0.1:8000) へ中継し、Django が処理
#
# 適用方法は deploy/README.md を参照。

server {
    listen 80;
    server_name localhost 127.0.0.1;

    # アップロードPDFのサイズに合わせて余裕を持たせる（フォームは10MB制限）
    client_max_body_size 12m;

    # 静的ファイル（collectstatic の出力先を直接配信）
    location /static/ {
        alias /home/nagin/ShiftManager/staticfiles/;
        access_log off;
        expires 7d;
    }

    # アップロードされたメディア（確定シフトPDF など）
    location /media/ {
        alias /home/nagin/ShiftManager/media/;
    }

    # 動的リクエストは Gunicorn へ中継
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
