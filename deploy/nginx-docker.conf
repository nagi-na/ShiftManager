# Docker compose 用 Nginx 設定（nginxコンテナにマウントして使う）

# 上位（Cloudflare等）が付けた X-Forwarded-Proto を尊重し、無ければ $scheme を使う。
# Cloudflare→nginx はHTTPなので $scheme だけだと https が伝わらず CSRF が失敗する。
map $http_x_forwarded_proto $fwd_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;                 # ホスト名を問わず受ける
    client_max_body_size 12m;

    location /static/ { alias /app/staticfiles/; }   # web と共有するボリューム

    # 確定シフト等のメディア。internal なので外部から直接は開けない。
    # Django(@login_required)が X-Accel-Redirect: /protected/... を返したときだけ送信。
    location /protected/ {
        internal;
        alias /app/media/;
    }

    location / {
        proxy_pass http://web:8000;                  # web = アプリのサービス名
        proxy_set_header Host $http_host;            # ポートも保持（CSRFのOrigin照合のため）
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;   # 上位のhttpsを保持
    }
}
