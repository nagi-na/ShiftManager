services:
  db:                                    # MySQL
    image: mysql:8
    environment:
      MYSQL_DATABASE: shift_manager
      MYSQL_USER: shift
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql            # DBの中身を永続化
    restart: unless-stopped

  web:                                   # アプリ（Gunicorn + Django）
    build: .
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DJANGO_SECRET_KEY: ${SECRET_KEY}
      DJANGO_DB: mysql
      DB_HOST: db                        # DBコンテナのサービス名で接続
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - staticfiles:/app/staticfiles     # Nginxと共有
      - media:/app/media
    depends_on:
      - db
    restart: unless-stopped

  nginx:                                 # 前段Webサーバー
    image: nginx:1.27
    ports:
      - "${HTTP_PORT:-80}:80"            # 公開ポート（既定80。HTTP_PORTで変更可）
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
      - media:/app/media:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:                                 # 永続データ置き場（名前付きボリューム）
  dbdata:
  staticfiles:
  media:
